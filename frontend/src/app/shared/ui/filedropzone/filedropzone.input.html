<label
  class="flex items-center justify-center gap-2 w-full h-full px-3 py-2 text-sm font-medium rounded-md cursor-pointer"
  [class.border-solid]="is_file_dragged()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onFileDrop($event)"
>
  <ng-icon
    class="w-4 h-4"
    name="lucideDownload"
  />
  <span>{{ placeholder() }}</span>
  <input
    class="hidden"
    type="file"
    [accept]="accept()"
    (change)="onFileSelect($event)"
  />
</label>
